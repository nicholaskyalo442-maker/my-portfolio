<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

/* ADD OR UPDATE PROJECT */
window.saveProject = async function () {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (editId) {
    // UPDATE EXISTING PROJECT
    await updateDoc(doc(db, "projects", editId), {
      title: title,
      description: desc
    });

    alert("Project Updated!");
    editId = null;

  } else {
    // CREATE NEW PROJECT
    await addDoc(collection(db, "projects"), {
      title: title,
      description: desc,
      createdAt: new Date()
    });

    alert("Project Added!");
  }

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";

  loadProjects();
}

/* LOAD PROJECTS */
async function loadProjects() {
  const snap = await getDocs(collection(db, "projects"));

  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach((d) => {
    const data = d.data();

    const div = document.createElement("div");
    div.className = "project";

    div.innerHTML = `
      <h4>${data.title}</h4>
      <p>${data.description}</p>

      <button onclick="editProject('${d.id}', '${data.title}', \`${data.description}\`)">
        Edit
      </button>

      <button class="delete" onclick="deleteProject('${d.id}')">
        Delete
      </button>
    `;

    list.appendChild(div);
  });
}

/* EDIT PROJECT (LOAD INTO FORM) */
window.editProject = function(id, title, description) {
  document.getElementById("title").value = title;
  document.getElementById("desc").value = description;

  editId = id;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* DELETE PROJECT */
window.deleteProject = async function(id) {
  await deleteDoc(doc(db, "projects", id));
  loadProjects();
}

loadProjects();
</script>
